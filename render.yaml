services:
  - type: web
    name: cima20paas
    runtime: node
    plan: starter
    buildCommand: bun install && bun run build
    startCommand: node .output/server/index.mjs
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: NUXT_PUBLIC_SITE_URL
        value: https://cima20paas.onrender.com
    healthCheckPath: /
    numInstances: 1
