services:
  cima20paas:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 3001:3001
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_SITE_URL=${NUXT_PUBLIC_SITE_URL:-https://www.cima20.com}
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-https://www.cima20.com}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-info@cima20.com}
    networks:
      - cima20paas-frontend
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cima20paas.rule=Host(`www.cima20.com`) || Host(`cima20.com`)"
      - "traefik.http.routers.cima20paas.entrypoints=websecure"
      - "traefik.http.routers.cima20paas.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cima20paas.tls.options=tls-hardened@file"
      - "traefik.http.routers.cima20paas.middlewares=public-hardening@file"
      - "traefik.http.routers.cima20paas-http.rule=Host(`www.cima20.com`) || Host(`cima20.com`)"
      - "traefik.http.routers.cima20paas-http.entrypoints=web"
      - "traefik.http.routers.cima20paas-http.middlewares=redirect-to-https@file"
    mem_limit: 512m
    cpus: 1.0

networks:
  cima20paas-frontend:
    external: true
